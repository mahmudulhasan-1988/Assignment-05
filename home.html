    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker Card</title>
     <!-- tailwind & Daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Daisyui Themes -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- font-awesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
    <div class="navbar bg-base-100 shadow-sm mb-10">
        <div>
            <img src="./assets/Github Navbar Logo.png" alt="">
        </div>
        <div class="flex-1">
            <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
            <input type="text" placeholder="Search issues...." class="input input-bordered w-24 md:w-auto" />
            <div class="dropdown dropdown-end">
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
            </div>
        </div>
    </div>
    <!-- Top Button Section -->
    <section class="w-11/12 mx-auto">
        <section id="spinner" class="flex justify-center items-center py-10 hidden">
              <span class="loading loading-bars loading-xl"></span>
        </section>


        <div class="px-10 shadow-sm py-8 bg-base-100 space-x-5 rounded-xl">

          <button id="all" class="btn btn-outline btn-active">All</button>
          <button id="open" class="btn btn-outline">Open</button>
          <button id="closed" class="btn btn-outline">Closed</button>

        </div>




    </section>

    <hr class="mt-5 border-gray-200 w-11/12 mx-auto">



    <section class="w-11/12 mx-auto mt-10 bg-base-100 shadow-sm py-5 px-5 rounded-xl">
        <!-- Header -->
    <div class="flex justify-between items-center mb-8">
  
        <div class="flex items-center gap-3">
        <div class="bg-purple-200 p-1 rounded-full">
            <img class=" py-2 px-2" src="./assets/Aperture.png" alt="">
        </div>
    <div>
      <h1 class="text-2xl font-bold">50 Issues</h1>
      <p class="text-gray-500">Track and manage your project issues</p>
    </div>
  </div>

  <div class="flex gap-5 text-sm">
    <p class="flex items-center gap-2">
      <span class="w-3 h-3 bg-green-500 rounded-full"></span>
      Open
    </p>
    <p class="flex items-center gap-2">
      <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
      Closed
    </p>
  </div>
