<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>

 <!-- tailwind & Daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      .error{
        font-size: 14px;
        display: none;
        text-align: center;
        color: red;
      }
    </style>

</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

  <div class="card w-96 bg-white shadow-xl p-6">

    <!-- Logo -->
    <div class="flex justify-center">
      <img class="w-16" src="./assets/github-logo.png">
    </div>

    <div class="text-center mt-3">
      <h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
      <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
    </div>

    <!-- Form -->
    <form id="loginForm" class="mt-6 space-y-3">
      <div>
        <p class="error text-red-600 text-center" id="error-message">Invalid Username of password</p>
        <label id="username" class="label font-semibold">Username</label>
        <input type="text" placeholder="Enter Username" class="input input-bordered w-full" />
        <p class="text-xs text-blue-600 mt-1">Default: admin</p>
      </div>

      <div>
        <label class="label font-semibold">Password</label>
        <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full" />
        <p class="text-xs text-blue-600 mt-1">Default: admin123</p>
      </div>

      <button class="btn btn-primary w-full mt-2">
        Sign In
      </button>

    </form>

    <!-- Divider -->
    <div class="divider">OR</div>

    <!-- Demo Credentials -->
     <p class="font-semibold mb-1 text-center text-gray-400">Demo Credentials:</p>
    <div class="bg-gray-100 rounded-lg p-4 text-sm text-center">
      <p><b>Username:</b> <span class="text-gray-500">admin</span></p>
      <p><b>Password:</b> <span class="text-gray-500">admin123</span></p>
    </div>

  </div>




  
  <script>
    document.getElementById("loginForm").addEventListener("submit",((event)=> {
     event.preventDefault() 

     let username = document.getElementById("username").value
     let password = document.getElementById("password").value
     const web_user_name = "admin"
     const web_pw = "admin123"
     if(username === web_user_name || password === web_pw){
      window.location.href ="home.html"
     }
     else{
      document.getElementById("error-message").style.display="block"
     }
    }))
  </script>
</body>
</html>
